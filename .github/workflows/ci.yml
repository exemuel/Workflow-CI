name: MLflow CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-activate-base: true
        python-version: '3.12'

    - name: Install MLflow
      shell: bash -l {0}
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0

    - name: Start MLflow tracking server
      shell: bash -l {0}
      run: |
        mlflow server --host 127.0.0.1 --port 5000 &
        sleep 3  # Give the server time to start
        echo "MLflow server started"

    - name: Run MLflow Project
      shell: bash -l {0}
      run: |
        export MLFLOW_TRACKING_URI=http://127.0.0.1:5000
        python -c "import mlflow; mlflow.end_run()"  # Clear any active runs
        cd MLProject
        export MLFLOW_TRACKING_URI=file:./mlruns
        mlflow run .

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      run: |
        cd MLProject
        # Asumsikan kita menggunakan run terakhir untuk build model
        # mlflow models build-docker -m "models:/RandomForest_Basic/1" -n "exemuel/titanic-model:latest"
        # Dummy build-docker as this would require a real model path from tracking server
        echo "Building docker image with MLflow"
        mlflow models build-docker -m runs:/<RUN_ID>/model -n exemuel/titanic-model:latest
        docker push exemuel/titanic-model:latest