name: MLflow CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-activate-base: true
        python-version: '3.12'

    - name: Install MLflow
      shell: bash -l {0}
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0

    - name: Start MLflow tracking server
      shell: bash -l {0}
      run: |
        mlflow server --host 127.0.0.1 --port 5000 &
        sleep 3  # Give the server time to start
        echo "MLflow server started"

    - name: Run MLflow Project
      shell: bash -l {0}
      run: |
        export MLFLOW_TRACKING_URI=file:./mlruns
        cd MLProject || { echo "MLProject directory not found"; exit 1; }
        mlflow run . > /tmp/mlflow_output.txt 2>&1
        EXIT_CODE=$?
        cat /tmp/mlflow_output.txt
        if [ $EXIT_CODE -ne 0 ]; then
          echo "MLflow run failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi
        RUN_ID=$(grep -oP '(?<=Run ID: )\S+' /tmp/mlflow_output.txt | head -1)
        if [ -z "$RUN_ID" ]; then
          echo "ERROR: Could not extract RUN_ID from MLflow output"
          exit 1
        fi
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Captured Run ID: $RUN_ID"

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      run: |
        cd MLProject
        mlflow models build-docker -m "runs/${{ env.RUN_ID }}/model" -n exemuel/titanic-model:latest
        docker push exemuel/titanic-model:latest