name: MLflow CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install MLflow
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0

    - name: Run MLflow Project
      run: |
        cd MLProject
        mlflow run .

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      run: |
        cd MLProject
        # Asumsikan kita menggunakan run terakhir untuk build model
        # mlflow models build-docker -m "models:/RandomForest_Basic/1" -n "exemuel/titanic-model:latest"
        # Dummy build-docker as this would require a real model path from tracking server
        echo "Building docker image with MLflow"
        mlflow models build-docker -m runs:/<RUN_ID>/model -n exemuel/titanic-model:latest
        docker push exemuel/titanic-model:latest
